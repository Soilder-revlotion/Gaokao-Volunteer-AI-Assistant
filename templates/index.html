<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考志愿 AI 助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-hover: #ececf1;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #8e8ea0;
            --border: #e5e5e5;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --user-bubble: #f0f0f0;
            --ai-bubble: #ffffff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Header ===== */
        .header {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            background: var(--bg);
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .header-badge {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 8px;
            font-weight: 400;
        }

        .clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            opacity: 0;
            pointer-events: none;
        }

        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .clear-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* ===== Messages ===== */
        .messages {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .messages-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-logo {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 20px;
            color: white;
        }

        .empty-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 440px;
            width: 100%;
        }

        .quick-card {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .quick-card:hover {
            border-color: var(--accent);
            background: #f0fdf9;
            color: var(--text-primary);
        }

        /* Message rows */
        .msg-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-row.user .msg-avatar {
            background: #6b7280;
            color: white;
        }

        .msg-row.ai .msg-avatar {
            background: var(--accent);
            color: white;
        }

        .msg-body {
            max-width: calc(100% - 42px);
            min-width: 0;
        }

        .msg-bubble {
            font-size: 15px;
            line-height: 1.7;
            word-break: break-word;
            padding: 0;
        }

        .msg-row.user .msg-bubble {
            background: var(--user-bubble);
            padding: 10px 16px;
            border-radius: var(--radius);
            color: var(--text-primary);
        }

        .msg-row.ai .msg-bubble {
            color: var(--text-primary);
        }

        .msg-bubble strong {
            font-weight: 600;
        }

        .msg-bubble br + br {
            display: block;
            content: "";
            margin-top: 8px;
        }

        /* Loading dots */
        .msg-row.loading .msg-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 0;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== Input Area ===== */
        .input-area {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            background: var(--bg);
            padding: 16px;
        }

        .input-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 12px;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            resize: none;
            line-height: 1.5;
            max-height: 120px;
            min-height: 24px;
            font-family: inherit;
            padding: 4px 0;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 34px;
            height: 34px;
            border: none;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ===== Mobile ===== */
        @media (max-width: 768px) {
            .messages-inner {
                padding: 16px 12px;
            }
            .quick-grid {
                grid-template-columns: 1fr;
            }
            .msg-bubble {
                font-size: 14px;
            }
            .input-area {
                padding: 12px;
            }
            .empty-title {
                font-size: 18px;
            }
        }

        /* scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        .messages::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-title">高考志愿 AI 助手</span>
        <span class="header-badge">qwen2.5:3b</span>
        <button class="clear-btn" id="clearBtn" onclick="clearChat()" title="新对话">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        </button>
    </div>

    <div class="messages" id="messages">
        <div class="messages-inner" id="messagesInner">
            <div class="empty-state" id="emptyState">
                <div class="empty-logo">志</div>
                <div class="empty-title">高考志愿 AI 助手</div>
                <div class="empty-subtitle">基于本地知识库的智能问答，数据不出网</div>
                <div class="quick-grid">
                    <div class="quick-card" onclick="quickAsk('河南考生理科580分能上什么学校？')">河南理科580分<br>能上什么学校？</div>
                    <div class="quick-card" onclick="quickAsk('什么是平行志愿？')">什么是平行志愿？</div>
                    <div class="quick-card" onclick="quickAsk('计算机专业就业怎么样？')">计算机专业<br>就业怎么样？</div>
                    <div class="quick-card" onclick="quickAsk('清华大学排名多少？')">清华大学排名多少？</div>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="questionInput" rows="1" placeholder="输入你的问题..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="askQuestion()" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
        <div class="footer-note">本地运行 · 数据不出网 · 基于 RAG + Ollama</div>
    </div>

    <script>
        const messagesEl = document.getElementById("messages");
        const innerEl = document.getElementById("messagesInner");
        const emptyState = document.getElementById("emptyState");
        const input = document.getElementById("questionInput");
        const sendBtn = document.getElementById("sendBtn");
        const clearBtn = document.getElementById("clearBtn");
        let hasMessages = false;

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 120) + "px";
            sendBtn.disabled = !el.value.trim();
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        }

        function quickAsk(q) {
            input.value = q;
            sendBtn.disabled = false;
            askQuestion();
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        async function askQuestion() {
            const question = input.value.trim();
            if (!question) return;

            // Hide empty state
            if (!hasMessages) {
                emptyState.style.display = "none";
                hasMessages = true;
                clearBtn.classList.add("visible");
            }

            // Add user message
            appendMessage("user", escapeHtml(question));
            input.value = "";
            input.style.height = "auto";
            sendBtn.disabled = true;

            // Add loading
            const loadingEl = appendLoading();

            try {
                const resp = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });
                const data = await resp.json();

                loadingEl.remove();
                if (data.answer) {
                    appendMessage("ai", formatAnswer(data.answer));
                } else {
                    appendMessage("ai", '<span style="color:#ef4444">' + escapeHtml(data.error || "未知错误") + '</span>');
                }
            } catch (e) {
                loadingEl.remove();
                appendMessage("ai", '<span style="color:#ef4444">网络错误：' + escapeHtml(e.message) + '</span>');
            }

            sendBtn.disabled = !input.value.trim();
            input.focus();
        }

        function appendMessage(role, html) {
            const row = document.createElement("div");
            row.className = "msg-row " + role;

            const avatar = document.createElement("div");
            avatar.className = "msg-avatar";
            avatar.textContent = role === "user" ? "U" : "AI";

            const body = document.createElement("div");
            body.className = "msg-body";

            const bubble = document.createElement("div");
            bubble.className = "msg-bubble";
            bubble.innerHTML = html;

            body.appendChild(bubble);
            row.appendChild(avatar);
            row.appendChild(body);
            innerEl.appendChild(row);
            scrollToBottom();
            return row;
        }

        function appendLoading() {
            const row = document.createElement("div");
            row.className = "msg-row ai loading";

            const avatar = document.createElement("div");
            avatar.className = "msg-avatar";
            avatar.textContent = "AI";

            const body = document.createElement("div");
            body.className = "msg-body";

            const bubble = document.createElement("div");
            bubble.className = "msg-bubble";
            bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

            body.appendChild(bubble);
            row.appendChild(avatar);
            row.appendChild(body);
            innerEl.appendChild(row);
            scrollToBottom();
            return row;
        }

        function clearChat() {
            innerEl.innerHTML = "";
            innerEl.appendChild(emptyState);
            emptyState.style.display = "";
            hasMessages = false;
            clearBtn.classList.remove("visible");
            input.focus();
        }

        function escapeHtml(t) {
            const d = document.createElement("div");
            d.textContent = t;
            return d.innerHTML;
        }

        function formatAnswer(text) {
            return escapeHtml(text)
                .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                .replace(/\n- /g, "<br>· ")
                .replace(/\n(\d+)\. /g, "<br>$1. ")
                .replace(/\n/g, "<br>");
        }

        // Auto-focus input on load
        window.addEventListener("load", () => input.focus());
    </script>
</body>
</html>
